# yaml-language-server: $schema=../../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
nelmio_api_doc:
    documentation:
        info:
            title: Find Music
            description: Manage your music library
            version: 1.0.0
        components:
            parameters:
                Page:
                    name: page
                    in: query
                    description: Page number
                    schema: { type: integer, default: 1, example: 1 }
                Limit:
                    name: limit
                    in: query
                    description: Resources per page
                    schema: { type: integer, default: 50, example: 50 }
                SortByAlbum:
                    name: sort_by
                    in: query
                    description: Sort field
                    schema:
                        type: string
                        nullable: true
                        enum: [ title, artist, genre, releaseYear, format, label ]
                        example: title
                SortOrder:
                    name: sort_order
                    in: query
                    description: Order field
                    schema:
                        type: string
                        nullable: true
                        enum: [ ASC, DESC ]
                        example: DESC
                isFavorite:
                    name: isFavorite
                    in: query
                    description: Filter by favorite status
                    schema:
                        type: boolean
                        nullable: true
                        example: true
                Genre:
                    name: genre
                    in: query
                    description: Filter by genre
                    schema:
                        type: string
                        nullable: true
                        example: electronica
                Search:
                    name: search
                    in: query
                    description: 'Full-text search on title, artist and label using PostgreSQL websearch_to_tsquery. Supports natural language operators: quotes for exact phrases ("blue train"), minus to exclude (-live), OR for alternatives (vinyl OR cd). Results are ranked by relevance when search is active.'
                    schema:
                        type: string
                        nullable: true
                        example: coltrane

            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
            schemas:
                ExternalReference:
                    type: object
                    properties:
                        uuid:
                            type: string
                            format: uuid
                        albumUuid:
                            type: string
                            format: uuid
                        platform:
                            type: string
                        externalId:
                            type: string
                        metadata:
                            type: object
                            nullable: true

                Album:
                    type: object
                    properties:
                        uuid:
                            type: string
                            format: uuid
                        title:
                            type: string
                        artist:
                            type: string
                        genre:
                            type: string
                            nullable: true
                        releaseYear:
                            type: integer
                            nullable: true
                        format:
                            type: string
                            nullable: true
                        isFavorite:
                            type: boolean
                        label:
                            type: string
                            nullable: true
                        coverUrl:
                            type: string
                            nullable: true
                        createdAt:
                            type: string
                            format: date-time
                        updatedAt:
                            type: string
                            format: date-time
                            nullable: true
                        externalReferences:
                            type: array
                            items:
                                $ref: '#/components/schemas/ExternalReference'

                Pagination:
                    type: object
                    properties:
                        currentPage:
                            type: integer
                        maxPerPage:
                            type: integer
                        totalItems:
                            type: integer
                        totalPages:
                            type: integer
                        hasNextPage:
                            type: boolean
                        hasPreviousPage:
                            type: boolean

                Statistics:
                    type: object
                    properties:
                        totalAlbums:
                            type: integer
                        genres:
                            type: object
                            additionalProperties:
                                type: integer
                        formats:
                            type: object
                            additionalProperties:
                                type: integer
                        releaseYears:
                            type: object
                            additionalProperties:
                                type: integer
                        labels:
                            type: object
                            additionalProperties:
                                type: integer
                User:
                    type: object
                    properties:
                        uuid:
                            type: string
                            format: uuid
                        email:
                            type: string
                            format: email

                PaginatedAlbumResponse:
                    type: object
                    properties:
                        data:
                            type: array
                            items:
                                $ref: '#/components/schemas/Album'
                        pagination:
                            $ref: '#/components/schemas/Pagination'

                PaginatedExternalReferenceResponse:
                    type: object
                    properties:
                        data:
                            type: array
                            items:
                                $ref: '#/components/schemas/ExternalReference'
                        pagination:
                            $ref: '#/components/schemas/Pagination'

                ExternalReferenceListResponse:
                    type: object
                    properties:
                        data:
                            type: array
                            items:
                                $ref: '#/components/schemas/ExternalReference'

                StatisticsResponse:
                    type: object
                    properties:
                        stats:
                            $ref: '#/components/schemas/Statistics'
            responses:
                Created:
                    description: Resource created
                    headers:
                        Location:
                            description: URL of the created resource
                            schema:
                                type: string
                NoContent:
                    description: Resource updated/deleted
                Unauthorized:
                    description: Unauthorized
                Forbidden:
                    description: Forbidden
                NotFound:
                    description: Not found
                InvalidJson:
                    description: Invalid JSON
                Conflict:
                    description: Conflict (duplicate)
                ValidationError:
                    description: Validation error
        tags:
            -   name: Auth
            -   name: Users
            -   name: Albums
            -   name: External References
        paths:
            /api/login_check:
                post:
                    tags: [ Auth ]
                    summary: Get a JWT token
                    requestBody:
                        required: true
                        content:
                            application/json:
                                schema:
                                    required: [ email, password ]
                                    properties:
                                        email:
                                            type: string
                                            format: email
                                        password:
                                            type: string
                    responses:
                        '200':
                            description: JWT token
                            content:
                                application/json:
                                    schema:
                                        properties:
                                            token:
                                                type: string
                        '401':
                            description: Invalid credential


    areas:
        path_patterns:
            - ^/api(?!/doc$) # Accepts routes under /api except /api/doc
